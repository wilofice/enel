
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Contacts – Enel Dashboard</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }

    th {
      background: #f4f4f4;
    }

    tr:hover {
      background: #fafafa;
    }

    a {
      color: #0077cc;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .controls select {
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #bbb;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>Contacts</h1>
  <p><a href="/">← Back to Dashboard</a></p>

  <div class="controls">
    <label>
      <input type="checkbox" id="filter-unknown" onchange="renderContacts()"> Hide Unknown Contacts
    </label>
    <label>
      Sort
      <select id="sort-select" onchange="renderContacts()">
        <option value="last_sent:desc" selected>Last Sent (newest)</option>
        <option value="last_sent:asc">Last Sent (oldest)</option>
        <option value="name:asc">Name (A-Z)</option>
        <option value="name:desc">Name (Z-A)</option>
        <option value="seq:asc"># (low-high)</option>
        <option value="seq:desc"># (high-low)</option>
      </select>
    </label>
  </div>

  <table id="contacts-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Last Sent</th>
        <th>Phone ID</th>
      </tr>
    </thead>
    <tbody id="contacts-body">
      <tr>
        <td colspan="4">Loading...</td>
      </tr>
    </tbody>
  </table>
  <script>
    let allContacts = [];

    function formatDate(ts) {
      if (!ts) return '<em style="color:#999">Never</em>';
      const date = new Date(parseInt(ts) * 1000);
      return date.toLocaleString();
    }

    function sortContacts(list) {
      const select = document.getElementById('sort-select');
      const value = select ? select.value : 'last_sent:desc';
      const [field, direction] = value.split(':');
      const dir = direction === 'asc' ? 1 : -1;
      const copy = list.slice();

      copy.sort((a, b) => {
        let aVal;
        let bVal;

        if (field === 'name') {
          aVal = (a.name || '').toLowerCase();
          bVal = (b.name || '').toLowerCase();
        } else if (field === 'seq') {
          aVal = typeof a.seq === 'number' ? a.seq : Number.MAX_SAFE_INTEGER;
          bVal = typeof b.seq === 'number' ? b.seq : Number.MAX_SAFE_INTEGER;
        } else {
          aVal = a.last_sent ? parseInt(a.last_sent, 10) : 0;
          bVal = b.last_sent ? parseInt(b.last_sent, 10) : 0;
        }

        if (aVal === bVal) return 0;
        return aVal > bVal ? dir : -dir;
      });

      return copy;
    }

    function renderContacts() {
      const showOnlyKnown = document.getElementById('filter-unknown').checked;
      const tbody = document.getElementById('contacts-body');
      tbody.innerHTML = '';

      const filtered = showOnlyKnown
        ? allContacts.filter(c => c.name && c.name.trim() !== '')
        : allContacts;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4">${showOnlyKnown ? 'No known contacts found.' : 'No contacts found.'}</td></tr>`;
        return;
      }

      const sorted = sortContacts(filtered);

      sorted.forEach(c => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.seq}</td>
          <td>${c.name || '<em style="color:#999">Unknown</em>'}</td>
          <td>${formatDate(c.last_sent)}</td>
          <td>${c.id}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function loadContacts() {
      try {
        const res = await fetch('/contacts');
        allContacts = await res.json();
        renderContacts();
      } catch (err) {
        document.getElementById('contacts-body').innerHTML = '<tr><td colspan="4">Error loading contacts.</td></tr>';
      }
    }
    loadContacts();
  </script>
</body>

</html>
